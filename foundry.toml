[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib", "dependencies"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
	"forge-std/=dependencies/forge-std-1.14.0/src/"
]

[lint]
exclude_lints = ["mixed-case-variable", "unwrapped-modifier-logic", "asm-keccak256"]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[dependencies]
forge-std = "1.14.0"
